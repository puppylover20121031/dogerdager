name: build

on:
  push:
    branches: [libgdx-port, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # -------------------------
      # BUILD JAR
      # -------------------------
      - name: Build fat JAR
        run: |
          chmod +x gradlew
          ./gradlew :lwjgl3:fatJar --no-daemon --console=plain

      # -------------------------
      # PREPARE JAR
      # -------------------------
      - name: Stage JAR
        run: |
          mkdir -p stage
          cp lwjgl3/build/libs/DogerDager.jar stage/

      # -------------------------
      # BUILD WINDOWS EXE (APP IMAGE)
      # -------------------------
      - name: Build Windows app-image
        run: |
          jpackage \
            --type app-image \
            --name DogerDager \
            --input stage \
            --main-jar DogerDager.jar \
            --main-class com.unpuppyable.dogerdager.lwjgl3.Lwjgl3Launcher \
            --java-options "--enable-native-access=ALL-UNNAMED" \
            --dest dist

      # -------------------------
      # INSTALL BUTLER (FIXED + RELIABLE)
      # -------------------------
      - name: Install Butler
        shell: bash
        run: |
          curl -L -o butler.zip https://github.com/itchio/butler/releases/latest/download/butler-windows-amd64.zip
          unzip -o butler.zip

          BUTLER_PATH=$(find . -name "butler.exe" | head -n 1)
          cp "$BUTLER_PATH" ./butler.exe

      # -------------------------
      # VERIFY BUTLER
      # -------------------------
      - name: Verify Butler
        run: |
          ./butler.exe version

      # -------------------------
      # UPLOAD JAR TO ITCH
      # -------------------------
      - name: Upload JAR to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_USER: ${{ secrets.ITCH_USER }}
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
        run: |
          ./butler.exe push lwjgl3/build/libs/DogerDager.jar \
            "$ITCH_USER/$ITCH_GAME:jar"

      # -------------------------
      # UPLOAD WINDOWS EXE TO ITCH
      # -------------------------
      - name: Upload Windows EXE to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_USER: ${{ secrets.ITCH_USER }}
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
        run: |
          ./butler.exe push dist/DogerDager \
            "$ITCH_USER/$ITCH_GAME:windows"

      # -------------------------
      # ARTIFACTS (backup downloads)
      # -------------------------
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: DogerDager-jar
          path: lwjgl3/build/libs/DogerDager.jar

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DogerDager-windows
          path: dist/DogerDager

      # -------------------------
      # GITHUB RELEASE (tags only)
      # -------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lwjgl3/build/libs/DogerDager.jar
