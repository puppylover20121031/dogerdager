name: build

# Windows-only by design: targets are a runnable .jar and a Windows .exe.
# No native Linux/Mac packaging.

on:
  release:
    types: [published]

permissions:
  contents: write   # needed to attach files to a Release on tag

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # -------------------------
      # Build fat JAR
      # -------------------------
      - name: Build self-contained jar
        run: |
          chmod +x gradlew
          ./gradlew :lwjgl3:fatJar --no-daemon --console=plain

      - name: Stage jar for jpackage
        run: |
          mkdir -p stage
          cp lwjgl3/build/libs/DogerDager.jar stage/

      # -------------------------
      # Build Windows app-image
      # -------------------------
      - name: Package Windows app-image (.exe + bundled JRE)
        run: |
          jpackage \
            --type app-image \
            --name DogerDager \
            --input stage \
            --main-jar DogerDager.jar \
            --main-class com.unpuppyable.dogerdager.lwjgl3.Lwjgl3Launcher \
            --java-options "--enable-native-access=ALL-UNNAMED" \
            --dest dist

      - name: Zip the app-image
        run: 7z a DogerDager-windows.zip ./dist/DogerDager

      # -------------------------
      # Install Butler (itch.io CLI)
      # -------------------------
      - name: Install Butler
        shell: bash
        run: |
          curl -L -o butler.zip https://broth.itch.io/butler/windows-amd64/LATEST/archive/default
          unzip -o butler.zip
          chmod +x butler.exe
          echo "$(pwd)" >> $GITHUB_PATH

      # -------------------------
      # Authenticate Butler
      # -------------------------
      - name: Authenticate Butler
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler.exe login

      # -------------------------
      # Push build to itch.io
      # -------------------------
      - name: Upload to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_USER: ${{ secrets.ITCH_USER }}
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_CHANNEL: ${{ secrets.ITCH_CHANNEL }}
        run: |
          ./butler.exe push lwjgl3/build/libs/DogerDager.jar \
            "$ITCH_USER/$ITCH_GAME:$ITCH_CHANNEL"

      # -------------------------
      # Artifacts
      # -------------------------
      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: DogerDager-jar
          path: lwjgl3/build/libs/DogerDager.jar

      - name: Upload Windows app-image artifact
        uses: actions/upload-artifact@v4
        with:
          name: DogerDager-windows
          path: DogerDager-windows.zip

      # -------------------------
      # GitHub Release (only on tags)
      # -------------------------
      - name: Attach to Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lwjgl3/build/libs/DogerDager.jar
            DogerDager-windows.zip
