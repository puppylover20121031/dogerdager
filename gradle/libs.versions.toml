[versions]
java = "25"
slick2d = "1.0.2"
eos4j = "1.2.0"

[libraries]
# Slick2D pulls LWJGL 2 and org.jcraft:jorbis transitively; the game only
# touches org.newdawn.slick.{Sound,Music,Input}.
slick2d-core = { module = "org.slick2d:slick2d-core", version.ref = "slick2d" }
# Epic Online Services wrapper, served from JitPack (see settings repos).
eos4j = { module = "com.github.bearwaves:eos4j", version.ref = "eos4j" }
